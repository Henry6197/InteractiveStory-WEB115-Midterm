<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 280">
  <defs>
    <radialGradient id="redAura" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(239,68,68,0.2)"/>
      <stop offset="100%" stop-color="rgba(239,68,68,0)" />
    </radialGradient>
    <linearGradient id="hoodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    /* Breathing sway */
    @keyframes grinderBreathe {
      0%, 100% { transform: translateY(0) scaleY(1); }
      50% { transform: translateY(-2px) scaleY(1.005); }
    }
    .grinder-body { animation: grinderBreathe 4s ease-in-out infinite; }

    /* Red eye glow */
    @keyframes redEyePulse {
      0%, 100% { opacity: 0.6; r: 4; }
      50% { opacity: 1; r: 6; }
    }
    .red-eye-l { animation: redEyePulse 1.8s ease-in-out infinite; }
    .red-eye-r { animation: redEyePulse 1.8s ease-in-out infinite 0.3s; }

    /* Fist clench */
    @keyframes clenchL {
      0%, 70%, 100% { transform: rotate(0deg); }
      80% { transform: rotate(5deg) translateY(-3px); }
    }
    @keyframes clenchR {
      0%, 70%, 100% { transform: rotate(0deg); }
      85% { transform: rotate(-5deg) translateY(-3px); }
    }
    .fist-l { transform-origin: 55px 180px; animation: clenchL 5s ease infinite; }
    .fist-r { transform-origin: 125px 180px; animation: clenchR 5s ease infinite 0.5s; }

    /* Aura pulse */
    @keyframes auraPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.08); }
    }
    .red-aura { animation: auraPulse 3s ease-in-out infinite; }

    /* Menacing head tilt */
    @keyframes headTilt {
      0%, 100% { transform: rotate(0deg); }
      30% { transform: rotate(-2deg); }
      70% { transform: rotate(1.5deg); }
    }
    .head-group { transform-origin: 90px 75px; animation: headTilt 7s ease-in-out infinite; }
  </style>

  <!-- Red aura -->
  <ellipse class="red-aura" cx="90" cy="140" rx="80" ry="110" fill="url(#redAura)"/>

  <g class="grinder-body">
    <!-- Body / coat -->
    <path fill="#0c0a09" d="M55,110 L50,230 Q50,250 65,255 L115,255 Q130,250 130,230 L125,110 Q120,95 90,92 Q60,95 55,110 Z"/>

    <!-- Coat details -->
    <line x1="90" y1="110" x2="90" y2="248" stroke="rgba(148,163,184,0.05)" stroke-width="1"/>
    <path fill="none" stroke="rgba(148,163,184,0.06)" stroke-width="0.8"
          d="M70,115 Q75,125 70,140 M110,115 Q105,125 110,140"/>

    <!-- Arms -->
    <g class="fist-l">
      <path fill="#1c1917" d="M55,120 Q38,140 32,175 Q30,185 35,190 L45,188 Q46,175 52,155 Q55,140 57,130 Z"/>
      <!-- Fist -->
      <rect x="28" y="185" width="20" height="14" rx="5" fill="#292524"/>
    </g>
    <g class="fist-r">
      <path fill="#1c1917" d="M125,120 Q142,140 148,175 Q150,185 145,190 L135,188 Q134,175 128,155 Q125,140 123,130 Z"/>
      <rect x="132" y="185" width="20" height="14" rx="5" fill="#292524"/>
    </g>

    <!-- Hood -->
    <g class="head-group">
      <path fill="url(#hoodGrad)" d="M55,65 Q50,45 60,30 Q75,12 90,10 Q105,12 120,30 Q130,45 125,65 L130,100 Q120,108 90,110 Q60,108 50,100 Z"/>

      <!-- Hood shadow interior -->
      <path fill="#050403" d="M65,55 Q68,40 80,34 Q90,30 100,34 Q112,40 115,55 L118,88 Q108,95 90,96 Q72,95 62,88 Z"/>

      <!-- Eyes (red) -->
      <g filter="url(#redGlow)">
        <circle class="red-eye-l" cx="80" cy="65" r="4" fill="#ef4444"/>
        <circle class="red-eye-r" cx="100" cy="65" r="4" fill="#ef4444"/>
        <!-- Bright centers -->
        <circle cx="80" cy="65" r="1.5" fill="#fca5a5"/>
        <circle cx="100" cy="65" r="1.5" fill="#fca5a5"/>
      </g>

      <!-- Hood edge highlight -->
      <path fill="none" stroke="rgba(148,163,184,0.08)" stroke-width="1"
            d="M58,65 Q55,45 63,32 Q78,15 90,13 Q102,15 117,32 Q125,45 122,65"/>
    </g>

    <!-- Legs -->
    <rect fill="#0c0a09" x="68" y="240" width="18" height="30" rx="4"/>
    <rect fill="#0c0a09" x="94" y="240" width="18" height="30" rx="4"/>
    <!-- Boots -->
    <rect fill="#1c1917" x="65" y="265" width="24" height="8" rx="4"/>
    <rect fill="#1c1917" x="91" y="265" width="24" height="8" rx="4"/>
  </g>
</svg>