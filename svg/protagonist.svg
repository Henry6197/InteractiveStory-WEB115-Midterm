<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0b896"/>
      <stop offset="100%" stop-color="#c8956e"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1810"/>
      <stop offset="100%" stop-color="#4a2c1a"/>
    </linearGradient>
    <linearGradient id="hoodieGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="screenLight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(96,165,250,0.15)"/>
      <stop offset="100%" stop-color="rgba(96,165,250,0)"/>
    </radialGradient>
    <filter id="monitorGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes breathe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    .body-group { animation: breathe 3.5s ease-in-out infinite; }

    @keyframes screenPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    .screen { animation: screenPulse 4s ease-in-out infinite; }

    @keyframes cursorBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .cursor { animation: cursorBlink 1s steps(1) infinite; }

    @keyframes mouseClick {
      0%, 85%, 100% { transform: rotate(0deg); }
      90% { transform: rotate(-2deg); }
    }
    .mouse-hand { transform-origin: 130px 178px; animation: mouseClick 3s ease infinite; }

    @keyframes headBob {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      30% { transform: translateX(1px) rotate(0.5deg); }
      70% { transform: translateX(-1px) rotate(-0.5deg); }
    }
    .head { animation: headBob 5s ease-in-out infinite; }

    @keyframes faceGlow {
      0%, 100% { opacity: 0.12; }
      50% { opacity: 0.2; }
    }
    .face-light { animation: faceGlow 4s ease-in-out infinite; }
  </style>

  <!-- Screen glow on face -->
  <ellipse class="face-light" cx="100" cy="120" rx="60" ry="50" fill="url(#screenLight)"/>

  <!-- Chair -->
  <g>
    <!-- Chair back -->
    <path fill="#1a1530" d="M68,108 Q64,85 70,75 L130,75 Q136,85 132,108 Z" opacity="0.9"/>
    <path fill="#231d3d" d="M72,108 Q70,90 74,80 L126,80 Q130,90 128,108 Z"/>
    <!-- Seat -->
    <rect fill="#1e1b3a" x="65" y="155" width="70" height="10" rx="4"/>
    <!-- Chair legs -->
    <line x1="80" y1="165" x2="75" y2="210" stroke="#1a1530" stroke-width="4" stroke-linecap="round"/>
    <line x1="120" y1="165" x2="125" y2="210" stroke="#1a1530" stroke-width="4" stroke-linecap="round"/>
    <!-- Center pole -->
    <line x1="100" y1="165" x2="100" y2="200" stroke="#1a1530" stroke-width="5" stroke-linecap="round"/>
    <!-- Base -->
    <ellipse fill="#1a1530" cx="100" cy="210" rx="30" ry="5"/>
    <!-- Wheels -->
    <circle fill="#151030" cx="72" cy="212" r="4"/>
    <circle fill="#151030" cx="128" cy="212" r="4"/>
  </g>

  <!-- Desk -->
  <g>
    <rect fill="#1a1530" x="20" y="170" width="165" height="10" rx="3" stroke="#2e1a47" stroke-width="1"/>
    <!-- Desk legs -->
    <rect fill="#151030" x="30" y="180" width="5" height="60" rx="2"/>
    <rect fill="#151030" x="170" y="180" width="5" height="60" rx="2"/>
    <!-- Desk shelf -->
    <rect fill="#151030" x="30" y="220" width="145" height="4" rx="1" opacity="0.5"/>
  </g>

  <!-- Monitor -->
  <g>
    <!-- Stand -->
    <rect fill="#0f172a" x="93" y="140" width="14" height="32"/>
    <rect fill="#0f172a" x="83" y="168" width="34" height="5" rx="2"/>
    <!-- Frame -->
    <rect fill="#0f172a" x="50" y="80" width="100" height="62" rx="4" stroke="#334155" stroke-width="1.5"/>
    <!-- Screen -->
    <rect class="screen" fill="#0c1e36" x="55" y="85" width="90" height="52" rx="2"/>
    <!-- Screen content -->
    <rect fill="rgba(96,165,250,0.25)" x="62" y="94" width="40" height="2.5" rx="1"/>
    <rect fill="rgba(96,165,250,0.15)" x="62" y="100" width="60" height="2.5" rx="1"/>
    <rect fill="rgba(96,165,250,0.2)" x="62" y="106" width="30" height="2.5" rx="1"/>
    <rect fill="rgba(96,165,250,0.12)" x="62" y="112" width="50" height="2.5" rx="1"/>
    <rect fill="rgba(96,165,250,0.18)" x="62" y="118" width="35" height="2.5" rx="1"/>
    <!-- Cursor -->
    <rect class="cursor" fill="#60a5fa" x="99" y="118" width="2" height="5"/>
    <!-- Screen reflection -->
    <path fill="rgba(255,255,255,0.03)" d="M55,85 L90,85 L55,110 Z"/>
  </g>

  <!-- Body -->
  <g class="body-group">
    <!-- Torso / hoodie -->
    <path fill="url(#hoodieGrad)" d="M78,118 Q70,122 68,155 L132,155 Q130,122 122,118 Q115,115 100,114 Q85,115 78,118 Z"/>
    <!-- Hoodie pocket -->
    <path fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.8" d="M82,140 Q100,148 118,140"/>
    <!-- Hood strings -->
    <line x1="95" y1="118" x2="93" y2="130" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
    <line x1="105" y1="118" x2="107" y2="130" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>

    <!-- Left arm on desk -->
    <path fill="url(#hoodieGrad)" d="M68,124 Q58,130 50,155 L48,170 L56,172 L60,158 Q64,140 68,132 Z"/>
    <!-- Left hand -->
    <path fill="url(#skinGrad)" d="M48,168 Q45,172 48,176 Q52,178 58,175 Q60,172 56,168 Z"/>

    <!-- Right arm to mouse -->
    <g class="mouse-hand">
      <path fill="url(#hoodieGrad)" d="M132,124 Q142,130 148,155 L152,170 L144,172 L140,158 Q136,140 132,132 Z"/>
      <!-- Right hand -->
      <path fill="url(#skinGrad)" d="M142,168 Q140,172 142,176 Q146,178 152,175 Q155,172 152,168 Z"/>
      <!-- Mouse -->
      <rect fill="#475569" x="140" y="173" width="14" height="8" rx="4"/>
      <line x1="147" y1="173" x2="147" y2="177" stroke="#334155" stroke-width="0.8"/>
    </g>

    <!-- Neck -->
    <rect fill="url(#skinGrad)" x="94" y="105" width="12" height="14" rx="4"/>
  </g>

  <!-- Head -->
  <g class="head">
    <!-- Head shape -->
    <ellipse fill="url(#skinGrad)" cx="100" cy="88" rx="20" ry="23"/>
    <!-- Ears -->
    <ellipse fill="url(#skinGrad)" cx="80" cy="90" rx="4" ry="6"/>
    <ellipse fill="#c8956e" cx="80" cy="90" rx="2" ry="4" opacity="0.5"/>
    <ellipse fill="url(#skinGrad)" cx="120" cy="90" rx="4" ry="6"/>
    <ellipse fill="#c8956e" cx="120" cy="90" rx="2" ry="4" opacity="0.5"/>

    <!-- Hair -->
    <path fill="url(#hairGrad)" d="M80,82 Q80,62 100,58 Q120,62 120,82 L122,78 Q122,58 100,53 Q78,58 78,78 Z"/>
    <!-- Hair texture -->
    <path fill="none" stroke="rgba(74,44,26,0.4)" stroke-width="0.8" d="M85,72 Q90,65 100,63 M100,63 Q110,65 115,72"/>
    <!-- Messy fringe -->
    <path fill="url(#hairGrad)" d="M82,76 Q84,70 90,68 L88,76 Z"/>
    <path fill="url(#hairGrad)" d="M110,68 Q116,70 118,76 L112,76 Z"/>

    <!-- Eyebrows -->
    <path fill="#2a1810" d="M88,82 Q92,80 97,82 L97,83 Q92,81 88,83 Z"/>
    <path fill="#2a1810" d="M103,82 Q108,80 112,82 L112,83 Q108,81 103,83 Z"/>

    <!-- Eyes -->
    <ellipse fill="#0f172a" cx="93" cy="88" rx="4" ry="3.5"/>
    <ellipse fill="#0f172a" cx="107" cy="88" rx="4" ry="3.5"/>
    <!-- Iris -->
    <circle fill="#4a6741" cx="94" cy="88" r="2.2"/>
    <circle fill="#4a6741" cx="108" cy="88" r="2.2"/>
    <!-- Pupils -->
    <circle fill="#0a0a0a" cx="94.5" cy="88" r="1.2"/>
    <circle fill="#0a0a0a" cx="108.5" cy="88" r="1.2"/>
    <!-- Eye shine from monitor -->
    <circle fill="#60a5fa" cx="95.5" cy="87" r="0.8" opacity="0.7"/>
    <circle fill="#60a5fa" cx="109.5" cy="87" r="0.8" opacity="0.7"/>

    <!-- Nose -->
    <path fill="none" stroke="rgba(180,130,100,0.4)" stroke-width="1" stroke-linecap="round" d="M98,92 Q100,95 102,92"/>

    <!-- Mouth - slight smile -->
    <path fill="none" stroke="rgba(160,100,80,0.5)" stroke-width="1.2" stroke-linecap="round" d="M94,98 Q100,101 106,98"/>

    <!-- Headphone band -->
    <path fill="none" stroke="#1e293b" stroke-width="3" d="M78,82 Q78,60 100,56 Q122,60 122,82"/>
    <!-- Headphone cups -->
    <rect fill="#1e293b" x="74" y="82" width="10" height="14" rx="4"/>
    <rect fill="#334155" x="76" y="84" width="6" height="10" rx="3"/>
    <rect fill="#1e293b" x="116" y="82" width="10" height="14" rx="4"/>
    <rect fill="#334155" x="118" y="84" width="6" height="10" rx="3"/>
  </g>

  <!-- Keyboard on desk -->
  <g>
    <rect fill="#1e293b" x="60" y="172" width="45" height="3" rx="1.5" stroke="#334155" stroke-width="0.5"/>
    <!-- Key rows -->
    <g fill="#334155" opacity="0.6">
      <rect x="62" y="172.5" width="3" height="2" rx="0.5"/>
      <rect x="66.5" y="172.5" width="3" height="2" rx="0.5"/>
      <rect x="71" y="172.5" width="3" height="2" rx="0.5"/>
      <rect x="75.5" y="172.5" width="3" height="2" rx="0.5"/>
      <rect x="80" y="172.5" width="3" height="2" rx="0.5"/>
      <rect x="84.5" y="172.5" width="3" height="2" rx="0.5"/>
      <rect x="89" y="172.5" width="3" height="2" rx="0.5"/>
      <rect x="93.5" y="172.5" width="3" height="2" rx="0.5"/>
      <rect x="98" y="172.5" width="3" height="2" rx="0.5"/>
    </g>
  </g>

  <!-- Energy drink can -->
  <g>
    <rect fill="#7c3aed" x="160" y="162" width="8" height="12" rx="2"/>
    <rect fill="#9333ea" x="160" y="162" width="8" height="4" rx="2"/>
    <rect fill="#a855f7" x="162" y="163" width="4" height="1" rx="0.5" opacity="0.5"/>
  </g>
</svg>