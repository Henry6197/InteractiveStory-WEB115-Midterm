<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1e1045"/>
      <stop offset="60%" stop-color="#0a0520"/>
      <stop offset="100%" stop-color="#030010"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    /* Hover float */
    @keyframes hover {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .maren-body { animation: hover 4s ease-in-out infinite; }

    /* Eye pulse */
    @keyframes eyePulse {
      0%, 100% { opacity: 0.8; r: 10; }
      50% { opacity: 1; r: 13; }
    }
    .eye-glow-l, .eye-glow-r { animation: eyePulse 2.5s ease-in-out infinite; }
    .eye-glow-r { animation-delay: 0.3s; }

    /* Tendril sway */
    @keyframes tendrilL {
      0%, 100% { d: path("M75,200 Q55,230 50,265 Q48,278 55,280"); }
      50% { d: path("M75,200 Q45,225 40,260 Q38,278 48,282"); }
    }
    @keyframes tendrilR {
      0%, 100% { d: path("M125,200 Q145,230 150,265 Q152,278 145,280"); }
      50% { d: path("M125,200 Q155,225 160,260 Q162,278 152,282"); }
    }
    @keyframes tendrilM {
      0%, 100% { d: path("M100,210 Q98,240 95,270 Q94,280 100,282"); }
      50% { d: path("M100,210 Q102,242 105,270 Q106,280 100,282"); }
    }
    .tendril-l { animation: tendrilL 5s ease-in-out infinite; }
    .tendril-r { animation: tendrilR 5s ease-in-out infinite; animation-delay: 0.8s; }
    .tendril-m { animation: tendrilM 4s ease-in-out infinite; animation-delay: 0.4s; }

    /* Arm reach */
    @keyframes armReach {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-8deg) translateX(-5px); }
    }
    @keyframes armReachR {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(8deg) translateX(5px); }
    }
    .arm-l { transform-origin: 70px 140px; animation: armReach 6s ease-in-out infinite; }
    .arm-r { transform-origin: 130px 140px; animation: armReachR 6s ease-in-out infinite; animation-delay: 1.5s; }

    /* Shadow aura */
    @keyframes aura {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.08); }
    }
    .aura { animation: aura 3s ease-in-out infinite; }

    /* Wisp particles */
    @keyframes wisp1 { 0%, 100% { transform: translate(0,0); opacity: 0.3; } 50% { transform: translate(-15px,-20px); opacity: 0.7; } }
    @keyframes wisp2 { 0%, 100% { transform: translate(0,0); opacity: 0.2; } 50% { transform: translate(12px,-25px); opacity: 0.6; } }
    @keyframes wisp3 { 0%, 100% { transform: translate(0,0); opacity: 0.25; } 50% { transform: translate(-8px,-18px); opacity: 0.5; } }
    .wisp1 { animation: wisp1 4s ease-in-out infinite; }
    .wisp2 { animation: wisp2 5s ease-in-out infinite; animation-delay: 1s; }
    .wisp3 { animation: wisp3 3.5s ease-in-out infinite; animation-delay: 2s; }
  </style>

  <g class="maren-body">
    <!-- Shadow aura -->
    <ellipse class="aura" cx="100" cy="150" rx="70" ry="90" fill="url(#bodyGrad)" opacity="0.3" filter="url(#softGlow)"/>

    <!-- Main body mass -->
    <path fill="url(#bodyGrad)" d="M60,100 Q50,80 65,60 Q80,45 100,42 Q120,45 135,60 Q150,80 140,100 L145,170 Q140,200 125,210 L75,210 Q60,200 55,170 Z"/>

    <!-- Cloak / shoulder drape -->
    <path fill="#0d0828" opacity="0.7" d="M55,95 Q48,85 55,70 Q70,55 100,52 Q130,55 145,70 Q152,85 145,95 L140,110 Q130,100 100,98 Q70,100 60,110 Z"/>

    <!-- Arms -->
    <g class="arm-l">
      <path fill="#0d0828" d="M60,130 Q40,145 30,170 Q28,180 35,185 L42,180 Q48,165 60,148 Z"/>
      <!-- Claw fingers -->
      <path fill="#1a1040" d="M30,170 L22,175 M32,173 L25,180 M35,175 L28,184" stroke="#2d1b69" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g class="arm-r">
      <path fill="#0d0828" d="M140,130 Q160,145 170,170 Q172,180 165,185 L158,180 Q152,165 140,148 Z"/>
      <path fill="#1a1040" d="M170,170 L178,175 M168,173 L175,180 M165,175 L172,184" stroke="#2d1b69" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Face region (darker) -->
    <ellipse fill="#080420" cx="100" cy="85" rx="28" ry="22"/>

    <!-- Eyes -->
    <g filter="url(#glow)">
      <circle class="eye-glow-l" cx="88" cy="83" r="10" fill="url(#eyeGlow)"/>
      <circle class="eye-glow-r" cx="112" cy="83" r="10" fill="url(#eyeGlow)"/>
      <!-- Bright centers -->
      <circle cx="88" cy="83" r="4" fill="#c084fc"/>
      <circle cx="112" cy="83" r="4" fill="#c084fc"/>
      <!-- Inner pupils -->
      <circle cx="88" cy="83" r="2" fill="#e9d5ff"/>
      <circle cx="112" cy="83" r="2" fill="#e9d5ff"/>
    </g>

    <!-- Tendrils (lower body dissolving) -->
    <path class="tendril-l" fill="none" stroke="#0d0828" stroke-width="8" stroke-linecap="round"
          d="M75,200 Q55,230 50,265 Q48,278 55,280"/>
    <path class="tendril-r" fill="none" stroke="#0d0828" stroke-width="8" stroke-linecap="round"
          d="M125,200 Q145,230 150,265 Q152,278 145,280"/>
    <path class="tendril-m" fill="none" stroke="#0a0520" stroke-width="10" stroke-linecap="round"
          d="M100,210 Q98,240 95,270 Q94,280 100,282"/>

    <!-- Extra thin wispy tendrils -->
    <path fill="none" stroke="#1a1040" stroke-width="3" stroke-linecap="round" opacity="0.5"
          d="M85,205 Q70,235 65,270"/>
    <path fill="none" stroke="#1a1040" stroke-width="3" stroke-linecap="round" opacity="0.5"
          d="M115,205 Q130,235 135,270"/>

    <!-- Floating wisps -->
    <circle class="wisp1" cx="55" cy="90" r="3" fill="#8b5cf6" opacity="0.3"/>
    <circle class="wisp2" cx="148" cy="95" r="2.5" fill="#8b5cf6" opacity="0.2"/>
    <circle class="wisp3" cx="70" cy="115" r="2" fill="#c084fc" opacity="0.25"/>
  </g>
</svg>