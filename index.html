<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monster Romance — Case Opening</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>MONSTER ROMANCE</h1>
      <nav class="header-nav">
        <a href="index.html" class="nav-link active">CASES</a>
        <a href="story.html" class="nav-link">STORY</a>
      </nav>
      <div class="balance">Balance: $<span id="balance">1000.00</span></div>
    </header>

    <div class="opener-section">
      <div class="selected-case-info">
        <h2>CS:GO Weapon Case</h2>
        <p>Price: $<span id="casePrice">90</span></p>
      </div>

      <div class="roulette-container">
        <div class="roulette-marker"></div>
        <div class="roulette-strip" id="rouletteStrip"></div>
      </div>

      <button id="openBtn" class="btn btn-open">OPEN CASE</button>

      <div class="won-item" id="wonItem" style="display:none;">
        <h3>YOU UNBOXED</h3>
        <div class="won-item-card" id="wonItemCard"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
